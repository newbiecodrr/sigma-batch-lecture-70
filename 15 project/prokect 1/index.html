<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Start Screen -->
        <div class="screen active" id="start-screen">
            <h1>QUIZ TIME!</h1>
            <p id="text">Test your knowledge with our fun quiz!</p>
            <button type="button" id="start-btn">Start Quiz</button>
        </div>

        <!-- Quiz Screen -->
        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Question goes here</h2>
                <div class="quiz-info">
                    <p><span id="question-number">Question 1</span> of <span id="total-questions">5</span></p>
                    <p>Score: <span id="score">0</span></p>
                </div>
            </div>
            <div class="answers-container" id="answers-container"></div>
            <div class="progress-bar">
                <div id="progress"></div>
            </div>
        </div>

        <!-- Result Screen -->
        <div class="screen" id="result-screen">
            <h1>Quiz Completed!</h1>
            <div class="result-info">
                <p>You scored <span id="final-score">0</span> out of <span id="total-questions-result">5</span></p>
                <div id="result-message">GOOD JOB!</div>
            </div>
            <button type="button" id="restart-btn">Restart Quiz</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
